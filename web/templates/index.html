<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI财务分析智能助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 左侧栏：对话历史记录 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>💬 对话历史</h2>
                <button id="newChatBtn" class="new-chat-btn">➕ 新对话</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- 会话列表将在这里动态生成 -->
                <div class="empty-state">
                    <p>暂无对话历史</p>
                    <p class="hint">开始新的对话吧！</p>
                </div>
            </div>
        </div>

        <!-- 中间：主对话区域 -->
        <div class="main-content">
            <div class="header">
                <h1>AI财务分析智能助手</h1>
                <p class="subtitle">支持自然语言提问 | 数据来源追溯 | 多轮对话</p>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <div class="welcome-icon">📊</div>
                    <h2>欢迎使用AI财务分析助手</h2>
                    <p>我可以帮您分析公司财务数据、解读年报内容、对比财务指标等</p>
                    <div class="example-questions">
                        <p class="example-title">试试这些问题：</p>
                        <button class="example-btn" onclick="askExample('腾讯2023年的营收情况如何？')">腾讯2023年的营收情况如何？</button>
                        <button class="example-btn" onclick="askExample('对比腾讯和阿里的净利润')">对比腾讯和阿里的净利润</button>
                        <button class="example-btn" onclick="askExample('苹果公司的最新财报数据')">苹果公司的最新财报数据</button>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="请输入您的财务分析问题..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button id="sendBtn" onclick="sendMessage()">
                        <span>发送</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13"></path>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                        </svg>
                    </button>
                </div>
                <div class="input-hints">
                    <span>按 Enter 发送 | Shift + Enter 换行</span>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
